<!DOCTYPE html>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission Planner - Fixed Grid Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin:0; font-family:"Times New Roman", serif; }
        .container { display:flex; }
        #map { width:75%; height:100vh; }
        .sidebar {
            width:25%;
            padding:15px;
            border-left:1px solid #ccc;
            overflow:auto;
            height: 100vh;
            box-sizing: border-box;
            background: #f9f9f9;
        }
        table { width:100%; border-collapse:collapse; margin-bottom: 10px; background: white; }
        td,th { border:1px solid #ccc; font-size:12px; padding:6px; text-align: center; }
        input { width:100%; box-sizing: border-box; padding: 4px; }
        .coord-input { width: 80px; margin-bottom: 5px; }
        button { margin: 5px 0; width: 100%; cursor: pointer; padding: 8px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
        .wind-arrow {
            font-size: 20px;
            font-weight: bold;
            color: #000;
            text-align: center;
            text-shadow: 1px 1px 2px #fff;
            pointer-events: none;
        }
        h3 { margin-top: 0; color: #333; }
        .mode-select { padding: 8px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="map"></div>

    <div class="sidebar">
        <h3>Mission Settings</h3>
        Start Location<br>
        <input id="startLat" class="coord-input" value="52.0907">
        <input id="startLon" class="coord-input" value="5.1214"><br>
        
        End Location<br>
        <input id="endLat" class="coord-input" value="52.3676">
        <input id="endLon" class="coord-input" value="4.9041"><br>

        <button onclick="initMission()" style="background: #e1f5fe;">1. Initialize / Reset</button>
        <button onclick="undoWaypoint()">Undo Last Waypoint</button>

        <hr>
        <strong>Planner Mode</strong><br>
        <select id="mapMode" class="mode-select" onchange="toggleMode()">
            <option value="waypoint">Waypoint Mode (Click Map)</option>
            <option value="wind">Wind Mode (Click Grid)</option>
        </select>

        <hr>
        <strong>Grid Resolution</strong><br>
        Step Size (Degrees):
        <input id="gridStep" type="number" step="0.1" value="0.5" style="width: 60px; margin-bottom:5px;">
        <button onclick="drawAll()" style="background: #fff3e0;">Apply Grid Step</button>

        <hr>
        <div id="wpContainer">
            <h3>Waypoints</h3>
            <table id="wpTable"></table>
        </div>

        <div id="windContainer" style="display:none;">
            <h3>Required Wind Data</h3>
            <p style="font-size: 11px; color: #666;">Cells intersecting path are Red. Green = Data Entered.</p>
            <table id="windTable"></table>
        </div>

        <hr>
        <button onclick="exportExcel()" style="background: #c8e6c9; height: 50px; font-size: 16px;">Generate & Download CSV</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    let map;
    let waypoints = [];
    let markers = [];
    let polyline;
    let gridLayer = L.layerGroup();
    let arrowLayer = L.layerGroup();

    let gridData = {}; 
    let requiredCells = new Set();

    // ---------------- INITIALIZE ----------------
    function initMission() {
        const sLat = parseFloat(document.getElementById('startLat').value);
        const sLon = parseFloat(document.getElementById('startLon').value);
        const eLat = parseFloat(document.getElementById('endLat').value);
        const eLon = parseFloat(document.getElementById('endLon').value);

        if (isNaN(sLat) || isNaN(sLon) || isNaN(eLat) || isNaN(eLon)) {
            alert("Please enter valid decimal coordinates.");
            return;
        }

        waypoints = [[sLat, sLon], [eLat, eLon]];
        gridData = {}; 

        if (!map) {
            map = L.map('map').setView([sLat, sLon], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on("click", onMapClick);
            gridLayer.addTo(map);
            arrowLayer.addTo(map);
        }
        drawAll();
    }

    // ---------------- MAP INTERACTION ----------------
    function onMapClick(e) {
        if (document.getElementById('mapMode').value !== "waypoint") return;
        // Insert waypoint before the end point
        waypoints.splice(waypoints.length - 1, 0, [e.latlng.lat, e.latlng.lng]);
        drawAll();
    }

    function toggleMode() {
        const mode = document.getElementById('mapMode').value;
        document.getElementById('wpContainer').style.display = (mode === 'waypoint') ? 'block' : 'none';
        document.getElementById('windContainer').style.display = (mode === 'wind') ? 'block' : 'none';
    }

    // ---------------- CORE DRAWING ----------------
    function drawAll() {
        if (waypoints.length < 2) return;
        clearLayers();
        drawPath();
        createFixedGrid();
        updateWaypointTable();
        updateWindTable();
    }

    function clearLayers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        if (polyline) map.removeLayer(polyline);
        gridLayer.clearLayers();
        arrowLayer.clearLayers();
    }

    function drawPath() {
        polyline = L.polyline([], {color: '#2196f3', weight: 4, dashArray: '5, 10'}).addTo(map);
        waypoints.forEach((p, i) => {
            const m = L.marker(p, {draggable: true}).addTo(map);
            m.on("dragend", e => {
                waypoints[i] = [e.target.getLatLng().lat, e.target.getLatLng().lng];
                drawAll();
            });
            m.on("contextmenu", () => {
                if (i !== 0 && i !== waypoints.length - 1) {
                    waypoints.splice(i, 1);
                    drawAll();
                }
            });
            markers.push(m);
            polyline.addLatLng(p);
        });
    }

    // ---------------- FIXED GEOGRAPHIC GRID ----------------
    function createFixedGrid() {
        const step = parseFloat(document.getElementById('gridStep').value) || 0.5;
        requiredCells.clear();

        // 1. Identify required cells by sampling path segments
        for (let i = 0; i < waypoints.length - 1; i++) {
            let p1 = waypoints[i];
            let p2 = waypoints[i+1];
            for (let j = 0; j <= 100; j++) {
                let lat = p1[0] + (p2[0] - p1[0]) * (j / 100);
                let lon = p1[1] + (p2[1] - p1[1]) * (j / 100);
                
                // Key = South-West corner of the degree block
                let r = Math.floor(lat / step) * step;
                let c = Math.floor(lon / step) * step;
                requiredCells.add(`${r.toFixed(4)}_${c.toFixed(4)}`);
            }
        }

        // 2. Define drawing bounds (visible mission area + buffer)
        let lats = waypoints.map(p => p[0]);
        let lons = waypoints.map(p => p[1]);
        let minLat = Math.floor(Math.min(...lats) / step) * step - step;
        let maxLat = Math.ceil(Math.max(...lats) / step) * step + step;
        let minLon = Math.floor(Math.min(...lons) / step) * step - step;
        let maxLon = Math.ceil(Math.max(...lons) / step) * step + step;

        // 3. Render Grid
        for (let lat = minLat; lat < maxLat; lat += step) {
            for (let lon = minLon; lon < maxLon; lon += step) {
                const key = `${lat.toFixed(4)}_${lon.toFixed(4)}`;
                const isReq = requiredCells.has(key);
                const data = gridData[key];
                const hasData = data && data.speed !== "" && data.dir !== "";

                let rect = L.rectangle([[lat, lon], [lat + step, lon + step]], {
                    color: isReq ? "#333" : "#ccc",
                    weight: isReq ? 2 : 0.5,
                    fillColor: isReq ? (hasData ? "green" : "red") : "transparent",
                    fillOpacity: isReq ? 0.3 : 0
                }).addTo(gridLayer);

                // Add Arrow
                if (hasData) {
                    let center = [lat + step/2, lon + step/2];
                    L.marker(center, {
                        icon: L.divIcon({
                            className: '',
                            html: `<div class="wind-arrow" style="transform:rotate(${data.dir}deg)">↑</div>`,
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        })
                    }).addTo(arrowLayer);
                }

                rect.on("click", () => {
                    if (document.getElementById('mapMode').value !== "wind") return;
                    let s = prompt(`Wind Speed (m/s) for cell [Lat:${lat}, Lon:${lon}]:`, data?.speed || "");
                    if (s === null) return;
                    let d = prompt(`Wind Direction (0-360°) for cell [Lat:${lat}, Lon:${lon}]:`, data?.dir || "");
                    if (d === null) return;
                    gridData[key] = { speed: s, dir: d };
                    drawAll();
                });
            }
        }
    }

    // ---------------- UI TABLES ----------------
    function updateWaypointTable() {
        const t = document.getElementById("wpTable");
        t.innerHTML = "<tr><th>#</th><th>Lat</th><th>Lon</th><th></th></tr>";
        waypoints.forEach((p, i) => {
            let r = t.insertRow();
            r.insertCell().innerText = i;
            r.insertCell().innerHTML = `<input type="number" step="0.0001" value="${p[0].toFixed(4)}" onchange="waypoints[${i}][0]=parseFloat(this.value); drawAll();">`;
            r.insertCell().innerHTML = `<input type="number" step="0.0001" value="${p[1].toFixed(4)}" onchange="waypoints[${i}][1]=parseFloat(this.value); drawAll();">`;
            let btn = document.createElement("button");
            btn.innerText = "X";
            btn.style.width = "auto";
            btn.onclick = () => { if(i!==0 && i!==waypoints.length-1) { waypoints.splice(i,1); drawAll(); } };
            r.insertCell().appendChild(btn);
        });
    }

    function updateWindTable() {
        const t = document.getElementById("windTable");
        t.innerHTML = "<tr><th>Cell (SW Corner)</th><th>Spd</th><th>Dir</th></tr>";
        Array.from(requiredCells).sort().forEach(key => {
            let r = t.insertRow();
            const [lat, lon] = key.split("_");
            r.insertCell().innerText = `${lat}, ${lon}`;
            
            let sIn = document.createElement("input");
            sIn.value = gridData[key]?.speed || "";
            sIn.placeholder = "m/s";
            sIn.onchange = () => { if(!gridData[key]) gridData[key]={}; gridData[key].speed = this.value; drawAll(); };
            r.insertCell().appendChild(sIn);

            let dIn = document.createElement("input");
            dIn.value = gridData[key]?.dir || "";
            dIn.placeholder = "deg";
            dIn.onchange = () => { if(!gridData[key]) gridData[key]={}; gridData[key].dir = this.value; drawAll(); };
            r.insertCell().appendChild(dIn);
        });
    }

    // ---------------- EXPORT & UNDO ----------------
    function undoWaypoint() {
        if (waypoints.length > 2) {
            waypoints.splice(waypoints.length - 2, 1);
            drawAll();
        }
    }

    function exportExcel() {
    let missing = false;

    requiredCells.forEach(k => {
        if (!gridData[k] || gridData[k].speed === "" || gridData[k].dir === "") {
            missing = true;
        }
    });

    if (missing) {
        alert("Error: Some required grid cells (red) are missing wind data.");
        return;
    }

    // ---------------- WAYPOINT SHEET ----------------
    const waypointData = waypoints.map((p, i) => ({
        Index: i,
        Latitude: p[0].toFixed(6),
        Longitude: p[1].toFixed(6)
    }));

    const wsWaypoints = XLSX.utils.json_to_sheet(waypointData);

    // ---------------- WIND SHEET ----------------
    const step = parseFloat(document.getElementById('gridStep').value) || 0.5;

    const windData = Array.from(requiredCells).map(key => {
    const [lat, lon] = key.split("_");
    const d = gridData[key] || {};
    return {
        GridSize_deg: step,
        SW_Lat: lat,
        SW_Lon: lon,
        Speed_mps: d.speed,
        Direction_deg: d.dir
    };
});

    const wsWind = XLSX.utils.json_to_sheet(windData);

    // ---------------- WORKBOOK ----------------
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsWaypoints, "Waypoints");
    XLSX.utils.book_append_sheet(wb, wsWind, "Wind Data");

    // ---------------- DOWNLOAD ----------------
    XLSX.writeFile(wb, "mission_plan.xlsx");
}
</script>
</body>
</html>
